experiment_name: literature_baseline_screening_v1
dataset_dir: data/target/processed/v1_manual_windows_resample512
output_root: results/literature_baseline_screening
seeds: [42]

split:
  type: loso_with_within_train_subject_stratified_validation
  subjects: [1, 2, 3, 4, 5, 6]
  val_windows_per_subject_class: 4
  train_windows_per_subject_class: 16
  strict_subject_isolation_for_test: true
  strict_index_disjoint_train_val: true

models:
  - cnn_lstm_literature_v1
  - cnn_gru_literature_v1
  - rescnn_bigru_attention_lite_v1
  - tcn_literature_v1
  - lstm_only_literature_v1
  - gru_only_literature_v1
  - transformer_encoder_lite_v1
  - feature_random_forest_v1
  - feature_linear_svm_v1

training:
  screening_mode: true
  allow_full_training: false
  max_epochs: 60
  batch_size: 16
  loss: cross_entropy
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0
  early_stopping:
    enabled: true
    monitor: val_macro_f1
    mode: max
    patience: 15
    min_delta: 0.0001
    restore_best: true
  gradient_clip_norm: null
  mixed_precision: false

normalization:
  global_standard_scaler: true
  fit_scaler_on: train_indices_only
  per_window_zscore: false
  save_scaler_stats: true

augmentation:
  enabled: false

checkpointing:
  save_best_checkpoint: true
  save_last_checkpoint: false
  save_model_state_dict: true
  checkpoint_policy: best_only
  save_optimizer_state: false

metrics:
  accuracy: true
  macro_f1: true
  weighted_f1: true
  class_wise_precision_recall_f1: true
  confusion_matrix: true
  subject_wise_metrics: true

reproducibility:
  deterministic: true
  save_config_snapshot: true
  save_git_status: true
  save_git_commit: true
  save_manifest_checksum: true
  save_model_parameter_count: true
  save_environment_info: true

safety:
  forbid_ssl: true
  forbid_augmentation: true
  forbid_focal_loss: true
  forbid_balanced_sampling: true
  forbid_external_dataset: true
  require_confirm_screening: true
  forbid_full_matrix: true
  max_allowed_seeds_for_screening: 1

