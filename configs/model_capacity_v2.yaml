  - name: channel_shared_attentionpool_v2
    notes: shared encoder 1개 + small attention pooling + small head
  - name: modality_shared_acc_gyro_encoder
    notes: 기존 acc/gyro shared encoder; flatten-head capacity 비교용
  - name: modality_shared_meanpool_v2
    notes: acc encoder 1개 + gyro encoder 1개 + modality-wise mean pooling
  - name: cnn2d_baseline_v1
    notes: 기존 2D time-channel baseline alias
