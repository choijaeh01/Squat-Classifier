seed: 20260617
input_shape:
  batch: 4
  window_length: 512
  channels: 18
num_classes: 5
output_dir: results/model_capacity_v2
models:
  - name: all_channel_conv1d_v1
    notes: 기존 all-channel Conv1D baseline alias
  - name: all_channel_conv1d_small
    notes: v2 shared 모델과 비교하기 위한 작은 all-channel baseline
  - name: channel_shared_1d_encoder
    notes: 기존 flatten-head shared encoder; capacity 비교용
  - name: channel_shared_meanpool_v2
